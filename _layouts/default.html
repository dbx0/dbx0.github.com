<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <meta name="description" content="{{ page.description | default: site.description | escape }}">
    <meta name="author" content="{{ page.author | default: 'dbx0' }}">
    {% if page.keywords %}<meta name="keywords" content="{{ page.keywords | join: ', ' }}">{% endif %}
    <link rel="canonical" href="{{ page.url | absolute_url }}">

    <!-- Open Graph -->
    <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    <meta property="og:title" content="{% if page.title %}{{ page.title }} // {% endif %}{{ site.title }}">
    <meta property="og:description" content="{{ page.description | default: site.description | escape }}">
    <meta property="og:site_name" content="{{ site.title }}">
    {% if page.date %}<meta property="article:published_time" content="{{ page.date | date_to_xmlschema }}">{% endif %}

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{% if page.title %}{{ page.title }} // {% endif %}{{ site.title }}">
    <meta name="twitter:description" content="{{ page.description | default: site.description | escape }}">

    <link rel="icon" type="image/x-icon" href="{{ '/assets/favicon.ico' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    <title>{% if page.title %}{{ page.title }} // {% endif %}{{ site.title }}</title>
</head>
<body>
    <div class="main">
        <div class="clock" id="clock"></div>
        <h1>root@dbx0.lol ˜/ $ ls</h1>
        {% include header.html %}
        <div class="content">
            {{ content }}
        </div>
    </div>
    
    {% include clock.html %}
    <script src="{{ '/assets/js/theme-toggle.js' | relative_url }}"></script>
</body>
</html>
